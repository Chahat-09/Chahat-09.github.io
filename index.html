<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chahat News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #667eea, #764ba2);
  color: white;
}

header {
  text-align: center;
  padding: 40px;
}

h1 {
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.news-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  color: black;
  width: 280px;
  margin: 15px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.btn {
  display: inline-block;
  padding: 8px 15px;
  background: #ff7a18;
  color: white;
  border-radius: 20px;
  text-decoration: none;
  margin-top: 10px;
}

.btn:hover {
  background: #ff4e50;
}

footer {
  text-align: center;
  padding: 20px;
  margin-top: 30px;
}
</style>
</head>

<body>

<header>
  <h1>Chahat News</h1>
  <p>Latest Updates & Stories</p>
</header>

<div class="container">
  <div class="news-grid">

    <!-- NEWS 1 -->
    <div class="card">
      <img src="images/news1.jpg">
      <div class="card-content">
        <h3>News Title 1</h3>
        <p>Short description of news...</p>
        <a href="news1.html" class="btn">Read More</a>
      </div>
    </div>

    <!-- NEWS 2 -->
    <div class="card">
      <img src="images/news2.jpg">
      <div class="card-content">
        <h3>News Title 2</h3>
        <p>Short description of news...</p>
        <a href="news2.html" class="btn">Read More</a>
      </div>
    </div>

    <!-- NEWS 3 -->
    <div class="card">
      <img src="images/news3.jpg">
      <div class="card-content">
        <h3>News Title 3</h3>
        <p>Short description of news...</p>
        <a href="news3.html" class="btn">Read More</a>
      </div>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Chahat News</p>
</footer>

</body>
</html>
